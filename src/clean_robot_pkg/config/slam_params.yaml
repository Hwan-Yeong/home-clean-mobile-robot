# ==============================================================================
# SLAM Toolbox Parameters for TurtleBot3 Waffle
# Mode: online_async (real-time async SLAM)
# ==============================================================================
slam_toolbox:
  ros__parameters:
    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    # Mapping Parameters
    map_update_interval: 1.0 # 5.0
    max_laser_range: 8.0 # 3.5     # TurtleBot3 Waffle LDS range
    min_laser_range: 1.0 # 0.12
    resolution: 0.05
    minimum_time_interval: 0.05 # 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.0

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2 # 0.5
    minimum_travel_heading: 0.5
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 6.0 # 10.0
    link_match_minimum_response_fine: 0.4 # 0.1
    link_scan_maximum_distance: 4.0 # 1.5
    loop_search_maximum_distance: 6.0 # 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 20 # 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.4 # 0.35
    loop_match_minimum_response_fine: 0.6 # 0.45

    # Correlation Parameters
    correlation_search_space_dimension: 0.2 # 0.5
    correlation_search_space_resolution: 0.05 # 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop Closure Parameters
    loop_search_space_dimension: 2.0 # 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.05 # 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.25 # 0.5
    angle_variance_penalty: 0.01 # 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.0347 # 0.349
    coarse_angle_resolution: 0.00347 # 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.25 # 0.5
    use_response_expansion: true
    occupancy_threshold: 0.05
    min_pass_through: 4

    # Stack Size (for large maps)
    stack_size_to_use: 40000000
